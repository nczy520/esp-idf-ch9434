name: Publish CH9434 component to ESP Component Registry

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  upload_components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload component to ESP Component Registry
        uses: espressif/upload-components-ci-action@v1
        with:
          name: ch9434
          version: ${{ github.ref_name }}
          path: ch9434
          api_token: ${{ secrets.ESP_COMPONENT_REGISTRY_TOKEN }}
